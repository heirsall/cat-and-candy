<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cat and Candy! 🐈</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <div id="score-bar">Score: <span id="score">0</span></div>
      <div id="game-frame">
        <div id="cat"></div>
        <div id="info-box" class="active">
          <p id="info-text">
            <b>Welcome to Cat & Candy 2!</b> Game ini dibuat untuk menghibur
            disaat kamu mencoba untuk rehat sebentar aja dari kondisi apapun
            yang saat ini lagi terasa memusingkan. 😬
          </p>
          <p>Tap <b>"Start"</b> untuk bermain! 😺</p>
          <br />
          <button id="info-button">Start</button>
          <button id="terimakasih-button">for-terimakaashi</button>
        </div>
      </div>
    </div>

    <!-- Sound -->
    <audio id="bgm" src="assets/bgm.mp3" loop></audio>
    <audio id="sfx-food" src="assets/eat.mp3"></audio>
    <audio id="sfx-bomb" src="assets/meow.mp3"></audio>
    <audio id="sfx-win" src="assets/win.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
